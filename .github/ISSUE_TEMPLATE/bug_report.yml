name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: input
    id: version
    attributes:
      label: Pageflare version
      description: Run `pageflare --version` to get this
      placeholder: "0.4.0"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - npm
        - Homebrew
        - Shell script (curl)
        - Docker
        - Built from source
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Deployment platform
      options:
        - Vercel
        - Netlify
        - Cloudflare Pages
        - None / self-hosted
        - Other
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug. Include what you expected vs what actually happened.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Run `pageflare dist -o out`
        2. Open `out/index.html`
        3. See error in console
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Paste your `pageflare.jsonc` if relevant (remove any sensitive values)
      render: json

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, framework, and any other relevant details
      placeholder: |
        - OS: macOS 14.3 / Ubuntu 22.04 / Windows 11
        - Node.js: 22.x
        - Framework: Astro 5 / Next.js 15 / WordPress 6.x
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste any relevant CLI output (run with `--log debug` for verbose output)
      render: shell
